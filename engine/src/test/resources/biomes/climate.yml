# Climate sampling configuration and per-biome climate envelopes
# Derived from BiomeLookupTable (8x8 temperature-humidity grid)

sampling:
  temperature:
    frequency: 0.001
    y-frequency: 0.005
  humidity:
    frequency: 0.001

