# GeoForge World Generation Configuration
#
# seed: World generation seed. Change this to get different terrain.
#       Default: 0L (produces consistent terrain across all worlds)
seed: 0

# Config version for migration support. Increment when structure changes.
config-version: 2

# Terrain height bounds (in block units)
terrain:
  sea-level: 63            # Water surface in blocks
  min-height: -64          # Lowest generated block
  max-height: 180          # Highest generated block
  continental-base: 50.0
  continental-height-amplitude: 120.0

# Fractal noise tuning
noise:
  backend: simplex     # Noise backend: "simplex" or "fastnoise"
  continental-frequency: 0.004  # UNUSED — reserved for future terrain noise
  continental-octaves: 4        # UNUSED — reserved for future terrain noise
  continental-lacunarity: 2.0   # UNUSED — reserved for future terrain noise
  continental-persistence: 0.5  # UNUSED — reserved for future terrain noise
  cave-frequency: 0.03       # 3D cave noise frequency (period ~33 blocks)
  cave-amplitude: 8.0        # Cave carving strength (0 = no caves)
  cave-octaves: 2            # Detail octaves for cave shape
  cave-lacunarity: 2.0       # Frequency multiplier per cave octave
  cave-persistence: 0.5      # Amplitude decay per cave octave
  ridge-frequency: 0.003
  ridge-octaves: 3
  ridge-amplitude: 1.0
  fbm-frequency: 0.005
  fbm-octaves: 4
  flat-frequency: 0.008
  continentalness-blend-sharpness: 2.0

# Climate noise frequencies
climate:
  temperature-frequency: 0.001
  temperature-y-frequency: 0.005
  humidity-frequency: 0.001

# Cave Y-envelope -- vertical distribution and shape variants
cave:
  center-y: -20.0
  spread: 48.0
  surface-cutoff: 8.0
  spaghetti-threshold: 0.3
  cheese-threshold: 0.5
  noodle-threshold: 0.15
  noodle-frequency: 0.05

# River carving parameters
river:
  frequency: 0.01
  depth: 8
  width: 3
  canyon-depth: 0
  canyon-width: 2
  valley-profile: vshaped
  floodplain-width: 5
  table-response: 0.0

# Hydraulic erosion droplet simulation
erosion:
  max-droplet-steps: 10
  iterations: 64
  droplet-count: 1024
  gravity: 0.2

# Surface decoration parameters
decorations:
  tree-density: 0.1
  vegetation-density: 0.3
  feature-seed-offset: 3405691582
  max-tree-height: 12

# Structure terrain flattening (chunk-centered, for development use)
plateau:
  size: 0                # Side length in blocks (0 = disabled)
  target-height: 64      # Flattened surface height

# Domain warping -- terrain distortion amplitude
domain-warp:
  amplitude: 1.5
