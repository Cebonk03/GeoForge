name: GeoForge
version: '1.0.0'
main: com.geoforge.plugin.GeoForgePlugin
meta:
  api-version: '1.21.4'
  folia-supported: true
load: STARTUP

generators:
  GeoForge:
    class: com.geoforge.plugin.GeoForgePlugin

commands:
  geoforgereload:
    description: Reload GeoForge biome configurations
    usage: /geoforgereload
    permission: geoforge.reload

permissions:
  geoforge.reload:
    description: Allows reloading GeoForge biome configs
    default: op
