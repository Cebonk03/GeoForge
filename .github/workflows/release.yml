name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Verify Gradle wrapper
        run: java -jar gradle/wrapper/gradle-wrapper.jar --version 2>&1 | head -3

  test:
    name: Test all modules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    needs: validate
    strategy:
      matrix:
        java: [21, 25]
      fail-fast: false
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/setup-java@v5
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: gradle
      # gradle/actions/setup-gradle@v6
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
      - name: Compile engine + api + v1_21_x (JDK 21)
        if: matrix.java == 21
        run: ./gradlew :engine:compileJava :api:compileJava :adapters:v1_21_x:compileJava --no-daemon
      - name: Compile v26_x + plugin (JDK 25)
        if: matrix.java == 25
        run: ./gradlew :adapters:v26_x:compileJava :plugin:compileJava --no-daemon
      - name: Run tests (JDK 21)
        if: matrix.java == 21
        run: ./gradlew :engine:test :api:test :adapters:v1_21_x:test --no-daemon
      - name: Run tests (JDK 25)
        if: matrix.java == 25
        run: ./gradlew :adapters:v26_x:test :plugin:test --no-daemon

  quality:
    name: Quality gate - SpotBugs + Checkstyle + ArchUnit + banned API scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      actions: write
    timeout-minutes: 15
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # Install BOTH JDKs for Gradle toolchain resolution.
      # actions/setup-java@v5
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle

      # actions/setup-java@v5
      - name: Set up JDK 25 (additional toolchain)
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 25
          distribution: 'temurin'

      # gradle/actions/setup-gradle@v6
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92

      # Pre-compile ALL modules so SpotBugs/Checkstyle have classes to analyze.
      - name: Compile all modules (both JDK 21 + 25 toolchains)
        run: ./gradlew classes --no-daemon

      - name: SpotBugs - bug pattern detection (all modules)
        run: >
          ./gradlew
          :engine:spotbugsMain
          :api:spotbugsMain
          :adapters:v1_21_x:spotbugsMain
          :adapters:v26_x:spotbugsMain
          :plugin:spotbugsMain
          --no-daemon

      - name: Checkstyle - code style enforcement (all modules)
        run: >
          ./gradlew
          :engine:checkstyleMain
          :api:checkstyleMain
          :adapters:v1_21_x:checkstyleMain
          :adapters:v26_x:checkstyleMain
          :plugin:checkstyleMain
          --no-daemon

      - name: ArchUnit - engine isolation test
        run: ./gradlew :engine:test --tests "com.geoforge.engine.arch.*" --no-daemon

      - name: Banned API scan
        run: |
          echo "=== Banned API Check ==="
          errors=0
          for pattern in "Registry\\.BIOME" "Biome\\.valueOf" "Biome\\.values()" \
            "Material\\.valueOf" "Material\\.getMaterial" "Material\\.matchMaterial" \
            "getScheduler()\\.run" "chunkData\\.setBiome(" "net\\.minecraft\\." "craftbukkit\\." \
            "ReentrantLock" "synchronized" "Class\\.forName"; do
            matches=$(grep -rn "$pattern" --include='*.java' . \
              | grep -v ":[[:space:]][*]" \
              | grep -v "EngineIsolationTest.java" \
              | grep -v "FoliaDetector.java" \
              || true)
            if [ -n "$matches" ]; then
                echo "FAIL: $pattern found in:"
                echo "$matches"
                errors=$((errors + 1))
            fi
          done
          if [ $errors -eq 0 ]; then
            echo "PASS: No banned APIs found"
          else
            echo "FATAL: $errors banned API pattern(s) detected"
            exit 1
          fi

      - name: Quality gate passed
        run: echo "✓ All quality checks passed"

  build:
    name: Build release JAR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: write
    needs: quality
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/setup-java@v5
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 25
          distribution: temurin
          cache: gradle
      # gradle/actions/setup-gradle@v6
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
      - name: Build ShadowJAR
        run: ./gradlew :plugin:shadowJar --no-daemon
      - name: Generate checksums
        run: |
          cd plugin/build/libs
          sha256sum GeoForge.jar > GeoForge.jar.sha256
          cat GeoForge.jar.sha256
      # actions/upload-artifact@v7
      - name: Upload built JAR
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-artifacts
          path: |
            plugin/build/libs/GeoForge.jar
            plugin/build/libs/GeoForge.jar.sha256

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    permissions:
      contents: write
      actions: read
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/download-artifact@v8
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-artifacts
          path: ./artifacts
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi
      - name: Generate release notes
        id: notes
        run: |
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## GeoForge ${{ steps.version.outputs.tag }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Changes" >> $GITHUB_OUTPUT
          git log --oneline --no-decorate $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD 2>/dev/null | while read line; do echo "- $line"; done >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Downloads" >> $GITHUB_OUTPUT
          echo "- GeoForge.jar (see assets below)" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Verify checksum
        run: sha256sum -c ./artifacts/GeoForge.jar.sha256
      # softprops/action-gh-release@v3
      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: GeoForge ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            ./artifacts/GeoForge.jar
            ./artifacts/GeoForge.jar.sha256
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: false
