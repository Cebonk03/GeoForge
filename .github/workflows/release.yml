name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: gradle/actions/wrapper-validation@v4

  test:
    name: Test all modules
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        java: [21, 25]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: ${{ matrix.java == 25 && 'oracle' || 'temurin' }}
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests (JDK 21)
        if: matrix.java == 21
        run: ./gradlew :engine:test :api:test :adapters:v1_21_x:test --no-daemon

      - name: Run tests (JDK 25)
        if: matrix.java == 25
        run: ./gradlew :adapters:v26_x:test :plugin:test --no-daemon

  build:
    name: Build release JAR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: oracle
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4

      - name: Build ShadowJAR
        run: ./gradlew :plugin:shadowJar --no-daemon

      - name: Generate checksums
        run: |
          cd plugin/build/libs
          sha256sum GeoForge.jar > GeoForge.jar.sha256
          cat GeoForge.jar.sha256

      - name: Upload built JAR
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            plugin/build/libs/GeoForge.jar
            plugin/build/libs/GeoForge.jar.sha256

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: ./artifacts

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: notes
        run: |
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## GeoForge ${{ steps.version.outputs.tag }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Changes" >> $GITHUB_OUTPUT
          git log --oneline --no-decorate $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD 2>/dev/null | while read line; do echo "- $line"; done >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Downloads" >> $GITHUB_OUTPUT
          echo "- GeoForge.jar (see assets below)" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: GeoForge ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            ./artifacts/GeoForge.jar
            ./artifacts/GeoForge.jar.sha256
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: false
