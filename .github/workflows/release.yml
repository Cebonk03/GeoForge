name: Release

on:
  push:
    tags:
      - "v*"
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/dependabot.yml'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # gradle/actions/wrapper-validation@v3
      - name: Verify Gradle wrapper
        uses: gradle/actions/wrapper-validation@6cfc8b8e8bb586cc164bef1c478c1eea3a4d6a19

  test:
    name: Test all modules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    needs: validate
    strategy:
      matrix:
        java: [21, 25]
      fail-fast: false
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/setup-java@v5
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
      # gradle/actions/setup-gradle@v6
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
        with:
          cache-read-only: ${{ matrix.java != 21 }}
          add-job-summary-as-pr-comment: on-failure
      - name: Compile engine + api + v1_21_x (JDK 21)
        if: matrix.java == 21
        run: ./gradlew :engine:compileJava :api:compileJava :adapters:v1_21_x:compileJava --no-daemon
      - name: Compile v26_x + plugin (JDK 25)
        if: matrix.java == 25
        run: ./gradlew :adapters:v26_x:compileJava :plugin:compileJava --no-daemon
      - name: Run tests (JDK 21)
        if: matrix.java == 21
        run: ./gradlew :engine:test :api:test :adapters:v1_21_x:test --no-daemon
      - name: Run tests (JDK 25)
        if: matrix.java == 25
        run: ./gradlew :adapters:v26_x:test :plugin:test --no-daemon
      # actions/upload-artifact@v7
      - name: Upload JaCoCo coverage data (JDK ${{ matrix.java }})
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jacoco-data-jdk${{ matrix.java }}
          path: '**/build/jacoco/'
          include-hidden-files: true
          retention-days: 1

  quality:
    name: Quality gate - SpotBugs + Checkstyle + ArchUnit + banned API scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # Install BOTH JDKs for Gradle toolchain resolution.
      # actions/setup-java@v5
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 21
          distribution: 'temurin'

      # actions/setup-java@v5
      - name: Set up JDK 25 (additional toolchain)
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 25
          distribution: 'temurin'

      # gradle/actions/setup-gradle@v6
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
        with:
          add-job-summary-as-pr-comment: on-failure

      # Pre-compile ALL modules so SpotBugs/Checkstyle have classes to analyze.
      - name: Compile all modules (both JDK 21 + 25 toolchains)
        run: ./gradlew classes --no-daemon

      - name: SpotBugs - bug pattern detection (all modules)
        run: >
          ./gradlew
          :engine:spotbugsMain
          :api:spotbugsMain
          :adapters:v1_21_x:spotbugsMain
          :adapters:v26_x:spotbugsMain
          :plugin:spotbugsMain
          --no-daemon

      - name: Checkstyle - code style enforcement (all modules)
        run: >
          ./gradlew
          :engine:checkstyleMain
          :api:checkstyleMain
          :adapters:v1_21_x:checkstyleMain
          :adapters:v26_x:checkstyleMain
          :plugin:checkstyleMain
          --no-daemon

      - name: ArchUnit - engine isolation test
        run: ./gradlew :engine:test --tests "com.geoforge.engine.arch.*" --no-daemon

      - name: Banned API scan
        run: ./gradlew bannedApiScan --no-daemon

      - name: Quality gate passed
        run: echo "✓ All quality checks passed"

  coverage:
    name: Coverage - JaCoCo aggregated report
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/setup-java@v5
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 21
          distribution: 'temurin'
      # actions/setup-java@v5
      - name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 25
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
        with:
          add-job-summary-as-pr-comment: on-failure
      # actions/download-artifact@v8
      - name: Download JaCoCo exec data (JDK 21)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: jacoco-data-jdk21
          path: .
      # actions/download-artifact@v8
      - name: Download JaCoCo exec data (JDK 25)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: jacoco-data-jdk25
          path: .
      - name: Compile all modules (both JDK 21 + 25 toolchains)
        run: ./gradlew classes --no-daemon
      - name: Generate JaCoCo reports
        run: ./gradlew jacocoTestReport --no-daemon -x test
      - name: Verify coverage thresholds
        run: ./gradlew jacocoTestCoverageVerification --no-daemon -x test
      # actions/upload-artifact@v7
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-reports
          path: '**/build/reports/jacoco/'
          retention-days: 30
  build:
    name: Build release JAR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: write
    needs: [quality, coverage]
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/setup-java@v5
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 25
          distribution: temurin
      # gradle/actions/setup-gradle@v6
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
        with:
          add-job-summary-as-pr-comment: on-failure
      - name: Build ShadowJAR
        run: ./gradlew :plugin:shadowJar --no-daemon
      - name: Generate checksums
        run: |
          cd plugin/build/libs
          sha256sum GeoForge.jar > GeoForge.jar.sha256
          cat GeoForge.jar.sha256
      # actions/upload-artifact@v7
      - name: Upload built JAR
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-artifacts
          path: |
            plugin/build/libs/GeoForge.jar
            plugin/build/libs/GeoForge.jar.sha256
          retention-days: 90

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    permissions:
      contents: write
      actions: read
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/download-artifact@v8
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-artifacts
          path: ./artifacts
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi
      - name: Verify checksum
        run: sha256sum -c ./artifacts/GeoForge.jar.sha256
      # softprops/action-gh-release@v3
      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: GeoForge ${{ steps.version.outputs.tag }}
          files: |
            ./artifacts/GeoForge.jar
            ./artifacts/GeoForge.jar.sha256
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: true
