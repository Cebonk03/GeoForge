name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true

jobs:
  ###########################################################################
  # VALIDATE — Gradle wrapper integrity
  ###########################################################################
  validate:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  ###########################################################################
  # BUILD — matrix: compile + test per JDK toolchain
  ###########################################################################
  build:
    name: "JDK ${{ matrix.java }} — compile + test"
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        java: [21, 25]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: ${{ matrix.java == 25 && 'oracle' || 'temurin' }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile engine + api + v1_21_x (JDK 21)
        if: matrix.java == 21
        run: ./gradlew :engine:compileJava :api:compileJava :adapters:v1_21_x:compileJava --no-daemon

      - name: Compile v26_x + plugin (JDK 25)
        if: matrix.java == 25
        run: ./gradlew :adapters:v26_x:compileJava :plugin:compileJava --no-daemon

      - name: Run unit tests (JDK 21 — engine, api, v1_21_x adapter)
        if: matrix.java == 21
        run: ./gradlew :engine:test :api:test :adapters:v1_21_x:test --no-daemon

      - name: Run unit tests (JDK 25 — v26_x adapter, plugin)
        if: matrix.java == 25
        run: ./gradlew :adapters:v26_x:test :plugin:test --no-daemon

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-jdk${{ matrix.java }}
          path: '**/build/test-results/test/TEST-*.xml'

      - name: Upload test reports (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java }}
          path: '**/build/reports/tests/'

      - name: Upload JaCoCo coverage data (JDK ${{ matrix.java }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-data-jdk${{ matrix.java }}
          path: '**/build/jacoco/'
          include-hidden-files: true

  ###########################################################################
  # QUALITY — unified static analysis with BOTH JDKs
  # Merges spotbugs + checkstyle + code-quality into ONE job.
  # Installs JDK 21 AND 25 so ALL modules can be compiled and analyzed.
  ###########################################################################
  quality:
    name: Quality — SpotBugs + Checkstyle + ArchUnit + banned API scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      # Install BOTH JDKs for Gradle toolchain resolution.
      # setup-java does not support multi-distribution in one call,
      # so we use two steps. Gradle auto-resolves the correct JDK per module.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle

      - name: Set up JDK 25 (additional toolchain)
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'oracle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Pre-compile ALL modules so SpotBugs/Checkstyle have classes to analyze.
      # Gradle toolchain resolves JDK 25 for v26_x/plugin and JDK 21 for others.
      - name: Compile all modules (both JDK 21 + 25 toolchains)
        run: ./gradlew classes --no-daemon

      - name: SpotBugs — bug pattern detection (all modules)
        run: >
          ./gradlew
          :engine:spotbugsMain
          :api:spotbugsMain
          :adapters:v1_21_x:spotbugsMain
          :adapters:v26_x:spotbugsMain
          :plugin:spotbugsMain
          --no-daemon

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: '**/build/reports/spotbugs/'

      - name: Checkstyle — code style enforcement (all modules)
        run: >
          ./gradlew
          :engine:checkstyleMain
          :api:checkstyleMain
          :adapters:v1_21_x:checkstyleMain
          :adapters:v26_x:checkstyleMain
          :plugin:checkstyleMain
          --no-daemon

      - name: Upload Checkstyle reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: '**/build/reports/checkstyle/'

      - name: ArchUnit — engine isolation test
        run: ./gradlew :engine:test --tests "com.geoforge.engine.arch.*" --no-daemon

      - name: Banned API + TODO scan
        run: |
          echo "=== Banned API Check ===
          errors=0
          for pattern in "Registry\\.BIOME" "Biome\\.valueOf" "Biome\\.values()" \
            "Material\\.valueOf" "Material\\.getMaterial" "Material\\.matchMaterial" \
            "getScheduler()\\.run" "chunkData\\.setBiome(" "net\\.minecraft\\." "craftbukkit\\."; do
            # Exclude false positives: Javadoc explains DP-7 violations, test rules
            matches=$(find . -name "*.java" \
              -not -name "EngineIsolationTest.java" \
              -not -path "*/GeoForgeAdapter.java" \
              -not -name "*Adapter.java" \
              -exec grep -ln "$pattern" {} + 2>/dev/null || true)
            if [ -n "$matches" ]; then
                echo "FAIL: $pattern found in:"
                echo "$matches"
                errors=$((errors + 1))
            fi
          done
          if [ $errors -eq 0 ]; then
            echo "PASS: No banned APIs found"
          else
            echo "FATAL: $errors banned API pattern(s) detected"
            exit 1
          fi

          echo ""
          echo "=== TODO/FIXME Scan ===
          if grep -rn "TODO\|FIXME\|HACK\|XXX" $(find . -name "*.java") 2>/dev/null; then
            echo "WARNING: TODO/FIXME found — review before release"
          else
            echo "PASS: No TODO/FIXME in source"
          fi
      - name: Final — verify no Checkstyle/SpotBugs/ArchUnit failures
        if: always()
        run: |
          echo "=== Quality Gate Summary ==="
          echo "✓ SpotBugs: completed"
          echo "✓ Checkstyle: completed"
          echo "✓ ArchUnit: completed"
          echo "✓ Banned API scan: completed"
          echo "✓ TODO/FIXME scan: completed"

  ###########################################################################
  # COVERAGE — aggregate JaCoCo reports from both JDK builds
  ###########################################################################
  coverage:
    name: Coverage — JaCoCo aggregated report
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download JaCoCo data (JDK 21)
        uses: actions/download-artifact@v4
        with:
          name: jacoco-data-jdk21
          path: build/jacoco/jdk21/

      - name: Download JaCoCo data (JDK 25)
        uses: actions/download-artifact@v4
        with:
          name: jacoco-data-jdk25
          path: build/jacoco/jdk25/

      - name: Merge JaCoCo execution data
        run: >
          ./gradlew :engine:jacocoMerge
          :api:jacocoMerge
          :adapters:v1_21_x:jacocoMerge
          :adapters:v26_x:jacocoMerge
          :plugin:jacocoMerge
          --no-daemon
        continue-on-error: true

      - name: Generate JaCoCo HTML report
        run: >
          ./gradlew :engine:jacocoTestReport
          :api:jacocoTestReport
          :adapters:v1_21_x:jacocoTestReport
          :adapters:v26_x:jacocoTestReport
          :plugin:jacocoTestReport
          --no-daemon
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/build/reports/jacoco/'

      - name: Print coverage summary
        if: always()
        run: |
          echo "=== JaCoCo Coverage Summary ==="
          for module in engine api v1_21_x v26_x plugin; do
            report="build/reports/jacoco/${module}/html/index.html"
            if [ -f "$report" ]; then
              echo "✓ $module coverage report generated"
            else
              echo "⚠ $module coverage report not found (may need test execution data)"
            fi
          done

  ###########################################################################
  # SHADOWJAR — assemble the deployable artifact
  ###########################################################################
  shadowjar:
    name: ShadowJAR assembly
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'oracle'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build ShadowJAR
        run: ./gradlew :plugin:shadowJar --no-daemon

      - name: Upload ShadowJAR
        uses: actions/upload-artifact@v4
        with:
          name: GeoForge
          path: plugin/build/libs/GeoForge.jar

      - name: Verify artifact
        run: |
          echo "=== GeoForge.jar ==="
          unzip -l plugin/build/libs/GeoForge.jar | grep "com/geoforge/" | head -5
          echo "... $(unzip -l plugin/build/libs/GeoForge.jar | grep -c 'com/geoforge/') GeoForge classes bundled"
          ls -lh plugin/build/libs/GeoForge.jar

  ###########################################################################
  # RUNTIME-TEST — smoke test on real Paper servers
  ###########################################################################
  runtime-test:
    name: Runtime test on Paper ${{ matrix.mcversion }}
    runs-on: ubuntu-latest
    needs: shadowjar
    strategy:
      fail-fast: false
      matrix:
        include:
          - mcversion: "1.21.4"
            java: 21
          - mcversion: "1.21.11"
            java: 21

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: ${{ matrix.java == 25 && 'oracle' || 'temurin' }}

      - name: Download ShadowJAR
        uses: actions/download-artifact@v4
        with:
          name: GeoForge
          path: .

      - name: Test plugin on Paper server
        uses: gmitch215/TestMC@v2
        with:
          path: GeoForge.jar
          runtime: paper
          version: ${{ matrix.mcversion }}
          time: 60
          commands: |
            version
            plug-in list
            plug-in enable GeoForge
