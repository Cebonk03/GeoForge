name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [21, 25]
    name: "JDK ${{ matrix.java }} compile"

    steps:
      - uses: actions/checkout@v4

      - name: "Set up JDK ${{ matrix.java }}"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: "Compile engine + api (JDK 21)"
        if: matrix.java == 21
        run: ./gradlew :engine:compileJava :api:compileJava :adapters:v1_21_x:compileJava --no-daemon

      - name: "Compile v26_x + plugin (JDK 25)"
        if: matrix.java == 25
        run: ./gradlew :adapters:v26_x:compileJava :plugin:compileJava --no-daemon

      - name: "Run tests (JDK 21)"
        if: matrix.java == 21
        run: ./gradlew :engine:test :api:test :adapters:v1_21_x:test --no-daemon

      - name: "Run tests (JDK 25)"
        if: matrix.java == 25
        run: ./gradlew :adapters:v26_x:test :plugin:test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java }}
          path: '**/build/reports/tests/'

  full-build:
    runs-on: ubuntu-latest
    needs: build
    name: "Full assembly + ShadowJAR"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Full build + shadowJAR
        run: ./gradlew :plugin:shadowJar --no-daemon

      - name: Upload ShadowJAR
        uses: actions/upload-artifact@v4
        with:
          name: GeoForge
          path: plugin/build/libs/GeoForge.jar

  code-quality:
    runs-on: ubuntu-latest
    needs: build
    name: "Code quality"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run ArchUnit + all engine/api/v1_21_x tests
        run: ./gradlew :engine:test :api:test :adapters:v1_21_x:test --no-daemon

      - name: Check for banned APIs
        run: |
          echo "=== Banned API Check ==="
          ! grep -rn "Registry\.BIOME\|Biome\.valueOf\|Material\.valueOf\|getScheduler()\.run\|chunkData\.setBiome" src/ 2>/dev/null
          echo "PASS: No banned APIs found"
