name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

jobs:
  validate:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  build:
    name: "JDK ${{ matrix.java }} — compile + test"
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        java: [21, 25]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile engine + api + v1_21_x (JDK 21)
        if: matrix.java == 21
        run: ./gradlew :engine:compileJava :api:compileJava :adapters:v1_21_x:compileJava --no-daemon

      - name: Compile v26_x + plugin (JDK 25)
        if: matrix.java == 25
        run: ./gradlew :adapters:v26_x:compileJava :plugin:compileJava --no-daemon

      - name: Run unit tests (JDK 21 — engine, api, v1_21_x adapter)
        if: matrix.java == 21
        run: ./gradlew :engine:test :api:test :adapters:v1_21_x:test --no-daemon

      - name: Run unit tests (JDK 25 — v26_x adapter, plugin)
        if: matrix.java == 25
        run: ./gradlew :adapters:v26_x:test :plugin:test --no-daemon

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-jdk${{ matrix.java }}
          path: '**/build/test-results/test/TEST-*.xml'

      - name: Upload test reports (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java }}
          path: '**/build/reports/tests/'

  shadowjar:
    name: ShadowJAR assembly
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build ShadowJAR
        run: ./gradlew :plugin:shadowJar --no-daemon

      - name: Upload ShadowJAR
        uses: actions/upload-artifact@v4
        with:
          name: GeoForge
          path: plugin/build/libs/GeoForge.jar

      - name: Verify artifact
        run: |
          echo "=== GeoForge.jar ==="
          unzip -l plugin/build/libs/GeoForge.jar | grep "com/geoforge/" | head -5
          echo "... $(unzip -l plugin/build/libs/GeoForge.jar | grep -c 'com/geoforge/') GeoForge classes bundled"
          ls -lh plugin/build/libs/GeoForge.jar

  runtime-test:
    name: Runtime test on Paper ${{ matrix.mcversion }}
    runs-on: ubuntu-latest
    needs: shadowjar
    strategy:
      fail-fast: false
      matrix:
        include:
          - mcversion: "1.21.4"
            java: 21
          - mcversion: "1.21.11"
            java: 21
          - mcversion: "latest"
            java: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Download ShadowJAR
        uses: actions/download-artifact@v4
        with:
          name: GeoForge
          path: .

      - name: Test plugin on Paper server
        uses: gmitch215/TestMC@v2
        with:
          path: GeoForge.jar
          runtime: paper
          version: ${{ matrix.mcversion }}
          time: 60
          commands: |
            version
            plug-in list
            plug-in enable GeoForge

  spotbugs:
    name: SpotBugs — bug pattern detection
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4

      - name: Run SpotBugs
        run: ./gradlew :engine:spotbugsMain :api:spotbugsMain :plugin:spotbugsMain --no-daemon

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: '**/build/reports/spotbugs/'

  checkstyle:
    name: Checkstyle — code style enforcement
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4

      - name: Run Checkstyle
        run: ./gradlew :engine:checkstyleMain :api:checkstyleMain :plugin:checkstyleMain --no-daemon

      - name: Upload Checkstyle reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: '**/build/reports/checkstyle/'

  code-quality:
    name: Final code quality gate
    runs-on: ubuntu-latest
    needs: [spotbugs, checkstyle]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Run ArchUnit engine isolation test
        run: ./gradlew :engine:test --tests "com.geoforge.engine.arch.*" --no-daemon

      - name: Banned API + TODO scan
        run: |
          echo "=== Banned API Check ==="
          errors=0
          for pattern in "Registry\\.BIOME" "Biome\\.valueOf" "Biome\\.values()" \
            "Material\\.valueOf" "Material\\.getMaterial" "Material\\.matchMaterial" \
            "getScheduler()\\.run" "chunkData\\.setBiome(" "net\\.minecraft\\." "craftbukkit\\."; do
            matches=$(find . -name "*.java" -exec grep -ln "$pattern" {} + 2>/dev/null || true)
            if [ -n "$matches" ]; then
          done
          if [ "$errors" -gt 0 ]; then echo "BANNED API CHECK FAILED: $errors violations"; exit 1; fi
          echo "PASS: No banned APIs found"

          echo ""
          echo "=== TODO/FIXME Scan ==="
          if grep -rn "TODO\|FIXME\|HACK\|XXX" src/ --include="*.java" 2>/dev/null; then
            echo "WARNING: TODO/FIXME found — review before release"
          else
            echo "PASS: No TODO/FIXME in source"
          fi
