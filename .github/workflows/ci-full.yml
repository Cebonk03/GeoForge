name: CI - Full

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

env:
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true

jobs:
  ###########################################################################
  # VALIDATE - Gradle wrapper integrity
  ###########################################################################
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Verify Gradle wrapper
        run: java -jar gradle/wrapper/gradle-wrapper.jar --version 2>&1 | head -3

  ###########################################################################
  # BUILD - matrix: compile + test per JDK toolchain
  ###########################################################################
  build:
    name: "JDK ${{ matrix.java }} - compile + test"
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      actions: write
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        java: [21, 25]

    steps:
      # actions/checkout@v4
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # actions/setup-java@v5
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: gradle

      # gradle/actions/setup-gradle@v6
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Compile engine + api + v1_21_x (JDK 21)
        if: matrix.java == 21
        run: ./gradlew :engine:compileJava :api:compileJava :adapters:v1_21_x:compileJava --no-daemon

      - name: Compile v26_x + plugin (JDK 25)
        if: matrix.java == 25
        run: ./gradlew :adapters:v26_x:compileJava :plugin:compileJava --no-daemon

      - name: Run unit tests (JDK 21 - engine, api, v1_21_x adapter)
        if: matrix.java == 21
        run: ./gradlew :engine:test :api:test :adapters:v1_21_x:test --no-daemon

      - name: Run unit tests (JDK 25 - v26_x adapter, plugin)
        if: matrix.java == 25
        run: ./gradlew :adapters:v26_x:test :plugin:test --no-daemon

      # actions/upload-artifact@v7
      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-results-jdk${{ matrix.java }}
          path: '**/build/test-results/test/TEST-*.xml'

      # actions/upload-artifact@v7
      - name: Upload JaCoCo coverage data (JDK ${{ matrix.java }})
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jacoco-data-jdk${{ matrix.java }}
          path: '**/build/jacoco/'
          include-hidden-files: true

  ###########################################################################
  # QUALITY - unified static analysis with BOTH JDKs
  ###########################################################################
  quality:
    name: Quality - SpotBugs + Checkstyle + ArchUnit + banned API scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: write
    timeout-minutes: 15

    steps:
      # actions/checkout@v4
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # Install BOTH JDKs for Gradle toolchain resolution.
      # actions/setup-java@v5
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle

      # actions/setup-java@v5
      - name: Set up JDK 25 (additional toolchain)
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 25
          distribution: 'temurin'

      # gradle/actions/setup-gradle@v6
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92

      # Pre-compile ALL modules so SpotBugs/Checkstyle have classes to analyze.
      - name: Compile all modules (both JDK 21 + 25 toolchains)
        run: ./gradlew classes --no-daemon

      - name: SpotBugs - bug pattern detection (all modules)
        run: >
          ./gradlew
          :engine:spotbugsMain
          :api:spotbugsMain
          :adapters:v1_21_x:spotbugsMain
          :adapters:v26_x:spotbugsMain
          :plugin:spotbugsMain
          --no-daemon

      # actions/upload-artifact@v7
      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: spotbugs-reports
          path: '**/build/reports/spotbugs/'

      - name: Checkstyle - code style enforcement (all modules)
        run: >
          ./gradlew
          :engine:checkstyleMain
          :api:checkstyleMain
          :adapters:v1_21_x:checkstyleMain
          :adapters:v26_x:checkstyleMain
          :plugin:checkstyleMain
          --no-daemon

      # actions/upload-artifact@v7
      - name: Upload Checkstyle reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: checkstyle-reports
          path: '**/build/reports/checkstyle/'

      - name: ArchUnit - engine isolation test
        run: ./gradlew :engine:test --tests "com.geoforge.engine.arch.*" --no-daemon

      - name: Banned API scan
        run: ./gradlew bannedApiScan --no-daemon

      - name: Final - quality gate summary
        if: always()
        run: |
          echo "=== Quality Gate Summary ==="
          echo "✓ SpotBugs: completed"
          echo "✓ Checkstyle: completed"
          echo "✓ ArchUnit: completed"
          echo "✓ Banned API scan: completed"
          echo "✓ TODO/FIXME scan: completed"

  ###########################################################################
  # COVERAGE - aggregate JaCoCo reports from both JDK builds
  ###########################################################################
  coverage:
    name: Coverage - JaCoCo aggregated report
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: write
    timeout-minutes: 15

    steps:
      # actions/checkout@v4
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # Install BOTH JDKs for Gradle toolchain resolution across all modules.
      # actions/setup-java@v5
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle

      # actions/setup-java@v5
      - name: Set up JDK 25 (additional toolchain)
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 25
          distribution: 'temurin'

      # gradle/actions/setup-gradle@v6
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92

      # Download exec data to repo root so files restore to module-specific paths
      # (e.g. engine/build/jacoco/test.exec). BOTH downloads merge cleanly since
      # JDK 21 covers engine/api/v1_21_x and JDK 25 covers v26_x/plugin.
      # actions/download-artifact@v8
      - name: Download JaCoCo exec data (JDK 21 - engine, api, v1_21_x)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: jacoco-data-jdk21
          path: .

      # actions/download-artifact@v8
      - name: Download JaCoCo exec data (JDK 25 - v26_x, plugin)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: jacoco-data-jdk25
          path: .

      # Compile all modules so class files exist for report class-to-exec matching.
      - name: Compile all modules (both JDK 21 + 25 toolchains)
        run: ./gradlew classes --no-daemon

      # Generate aggregated coverage reports using downloaded exec data.
      # -x test skips re-running tests since exec data is already present.
      - name: Generate JaCoCo reports
        run: ./gradlew jacocoTestReport --no-daemon -x test

      # Enforce minimum coverage thresholds (60% line, 50% branch).
      - name: Verify coverage thresholds
        run: ./gradlew jacocoTestCoverageVerification --no-daemon -x test

      # actions/upload-artifact@v7
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-reports
          path: '**/build/reports/jacoco/'

      - name: Print coverage summary
        if: always()
        run: |
          echo "=== JaCoCo Coverage Summary ==="
          for module in engine api v1_21_x v26_x plugin; do
            report="build/reports/jacoco/${module}/test/html/index.html"
            if [ -f "$report" ]; then
              echo "✓ $module coverage report generated"
            else
              echo "⚠ $module coverage report not found (may need test execution data)"
            fi
          done
  ###########################################################################
  # SHADOWJAR - assemble the deployable artifact
  ###########################################################################
  shadowjar:
    name: ShadowJAR assembly
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: write
    timeout-minutes: 5

    steps:
      # actions/checkout@v4
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # actions/setup-java@v5
      - name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 25
          distribution: 'temurin'
          cache: gradle

      # gradle/actions/setup-gradle@v6
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Build ShadowJAR
        run: ./gradlew :plugin:shadowJar --no-daemon

      # actions/upload-artifact@v7
      - name: Upload ShadowJAR
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: GeoForge
          path: plugin/build/libs/GeoForge.jar

      - name: Verify artifact
        run: |
          echo "=== GeoForge.jar ==="
          unzip -l plugin/build/libs/GeoForge.jar | grep "com/geoforge/" | head -5
          echo "... $(unzip -l plugin/build/libs/GeoForge.jar | grep -c 'com/geoforge/') GeoForge classes bundled"
          ls -lh plugin/build/libs/GeoForge.jar

  ###########################################################################
  # RUNTIME-TEST - smoke test on real Paper servers
  ###########################################################################
  runtime-test:
    name: Runtime test on Paper ${{ matrix.mcversion }}
    runs-on: ubuntu-latest
    needs: shadowjar
    permissions:
      contents: read
      actions: read
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - mcversion: "1.21.4"
            java: 21
          - mcversion: "1.21.11"
            java: 21
          - mcversion: "26.1.2"
            java: 25

    steps:
      # actions/checkout@v4
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # actions/setup-java@v5
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: gradle

      # actions/download-artifact@v8
      - name: Download ShadowJAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: GeoForge
          path: .

      - name: Test plugin on Paper server
        # SHA pinned for supply chain security; update by resolving the v2 tag
        uses: gmitch215/TestMC@6018a826cf7df53ca946fffabb8bc8d00b9c09f0 # v2
        with:
          path: GeoForge.jar
          runtime: paper
          version: ${{ matrix.mcversion }}
          time: 60
          commands: |
            version
            plugin list
            plugin enable GeoForge
